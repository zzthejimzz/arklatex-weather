<!doctype html>
<!-- Dev-only radar rendering testbed: /test-radar.html?v=lat,lon,zoom
     Lets us point the radar pipeline at live weather anywhere on the CONUS
     to judge palette/smoothing quality when the ArkLaTex is quiet. -->
<html>
<head>
  <meta charset="utf-8" />
  <title>radar test</title>
  <style>
    html, body, #map { margin: 0; height: 100%; background: #191919; }
    /* same grey-Pivotal remap the broadcast fallback uses, so radar colors
       are judged against the real land tone (#595959) */
    .leaflet-tile-pane { filter: grayscale(1) invert(1) brightness(0.485) contrast(4.5); }
  </style>
</head>
<body>
  <div id="map"></div>
  <script type="module">
    import L from 'leaflet';
    import 'leaflet/dist/leaflet.css';
    import { createRadarLoop } from '/src/map/radar-loop.js';

    const [lat, lon, z] = (new URLSearchParams(location.search).get('v') || '39,-97,5')
      .split(',').map(Number);
    const map = L.map('map', { zoomControl: false, zoomSnap: 0 }).setView([lat, lon], z);
    map.createPane('radar');
    map.getPane('radar').style.zIndex = 450;
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png', {
      subdomains: 'abcd',
    }).addTo(map);
    createRadarLoop(map);
  </script>
</body>
</html>
