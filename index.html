<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ArkLaTex Weather Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <!-- Fixed 1920×1080 broadcast stage, scaled to fit the window for preview.
       The encoder captures a browser running at exactly 1920×1080 (scale = 1). -->
  <div id="viewport">
    <div id="stage">
      <div id="map"></div>
      <header id="banner"></header>
      <aside id="popup-root"></aside>
      <aside id="forecast-root"></aside>
      <div id="outlook-chip"></div>
      <div id="mode-chip"></div>
      <footer id="ticker"></footer>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
